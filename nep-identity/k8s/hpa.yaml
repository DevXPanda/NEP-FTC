# Horizontal Pod Autoscaler for nep-identity. Placeholder.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nep-identity
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nep-identity
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
