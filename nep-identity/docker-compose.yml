# Local development stack for nep-identity — Postgres, Redis, RabbitMQ. Placeholder.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nep
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
